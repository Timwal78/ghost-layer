name: ci-and-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 ahead of June 16 forced cutover

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install flake8 bandit
      - name: Lint (flake8)
        run: |
          flake8 ghost/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=ghost/vapl/__init__.py
      - name: Security scan (bandit)
        run: |
          bandit -r ghost/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B101,B603,B607 \
            -f txt
      - name: Test
        run: pytest -q

  publish:
    # Runs only on a version tag, after tests pass.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for PyPI Trusted Publishing (OIDC) — no token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (Trusted Publishing — no API token)
        uses: pypa/gh-action-pypi-publish@v1.12.4
